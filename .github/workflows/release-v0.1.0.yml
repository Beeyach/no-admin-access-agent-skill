name: Publish v0.1.0

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-v0.1.0.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Create v0.1.0 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" ||
          gh release create v0.1.0             --repo "$GITHUB_REPOSITORY"             --target 7d4d928ad9b472ed8b1b86e4bf249c11cecfb618             --title "No Admin Access v0.1.0"             --notes "First public release of No Admin Access, an Agent Skill for Claude Code and Codex on locked-down computers. Includes a cross-platform environment probe, command checker, user-space installer, 18 automated tests, and CI across Windows, macOS, and Linux."
