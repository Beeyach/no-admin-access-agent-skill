name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile helper
        run: python -m py_compile skill/scripts/no_admin.py install.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Smoke-test both installers
        run: python install.py --target both --home installer-smoke-home

